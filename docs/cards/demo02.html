<body class="print-page">
  <main class="print-shell">
    <article class="print-card">
      <header>
        <p>岁月留痕 · 家庭数字记忆档案</p>
        <h1>父亲的老收音机</h1>
      </header>

      <div class="print-main">
        <img src="https://godjinfinity-cpu.github.io/suiyue-memory/media/families/F002/photo.jpg" alt="红灯牌收音机">
        <div>
          <dl>
            <div>
              <dt>物件</dt>
              <dd>红灯牌收音机</dd>
            </div>
            <div>
              <dt>年代</dt>
              <dd>20世纪80年代</dd>
            </div>
            <div>
              <dt>地点</dt>
              <dd>家中客厅</dd>
            </div>
          </dl>
          <p>这台收音机是父亲当年省下一个月工资买回来的。每天傍晚，家里人都会围坐在一起，听新闻、听评书、听音乐。它的声音有时并不清楚，却把一家人聚在了一张桌旁。后来电视和手机慢慢多了，这台收音机被收进柜子，但它留下的热闹和陪伴，一直没有被忘记。</p>
        </div>
      </div>

      <blockquote>那时一台收音机响起来，整个家就热闹了。</blockquote>
