<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一只上海手表的记忆｜故事卡</title>
  <link rel="stylesheet" href="https://godjinfinity-cpu.github.io/suiyue-memory/static/style.css">
</head>
<body class="print-page">
  <main class="print-shell">
    <article class="print-card">
      <header>
        <p>岁月留痕 · 家庭数字记忆档案</p>
        <h1>一只上海手表的记忆</h1>
      </header>

      <div class="print-main">
        <img src="https://godjinfinity-cpu.github.io/suiyue-memory/media/families/F001/photo.jpg" alt="上海牌手表">
        <div>
          <dl>
            <div>
              <dt>物件</dt>
              <dd>上海牌手表</dd>
            </div>
            <div>
              <dt>年代</dt>
              <dd>1950年代</dd>
            </div>
            <div>
              <dt>地点</dt>
              <dd>上海南京东路</dd>
            </div>
          </dl>
          <p>这只上海牌手表，是我年轻时在南京东路买下来的。那时候工资不高，我攒了好久才舍得把它带回家。它陪我上班、结婚、生子，也陪着一家人度过了许多平常却珍贵的日子。现在它已经不再走了，但每次拿起来，我还是会想起那个认真生活、一步一步把日子过好的年代。</p>
        </div>
      </div>

      <blockquote>它记录的不只是时间，也是我们一家人的日子。</blockquote>

      <footer>
        <div>
          <span>讲述人：张阿姨</span>
          <span>共创人：小雨</span>
          <span>展示范围：社区内部展示</span>
        </div>
        <img src="https://godjinfinity-cpu.github.io/suiyue-memory/qrcodes/DEMO01.png" alt="一只上海手表的记忆二维码">
      </footer>
    </article>
  </main>
</body>
</html>
