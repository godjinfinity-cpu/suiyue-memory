<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一面展墙里的社区记忆｜故事卡</title>
  <link rel="stylesheet" href="https://godjinfinity-cpu.github.io/suiyue-memory/static/style.css">
</head>
<body class="print-page">
  <main class="print-shell">
    <article class="print-card">
      <header>
        <p>岁月留痕 · 家庭数字记忆档案</p>
        <h1>一面展墙里的社区记忆</h1>
      </header>

      <div class="print-main">
        <img src="https://godjinfinity-cpu.github.io/suiyue-memory/media/families/F003/photo.jpg" alt="社区记忆展签">
        <div>
          <dl>
            <div>
              <dt>物件</dt>
              <dd>社区记忆展签</dd>
            </div>
            <div>
              <dt>年代</dt>
              <dd>2026年</dd>
            </div>
            <div>
              <dt>地点</dt>
              <dd>社区活动中心</dd>
            </div>
          </dl>
          <p>一张照片、一件物品、一段声音，都可以成为家庭记忆的入口。社区展墙把这些分散的故事放在一起，让长者的经历被更多人看见，也让孩子知道自己身边的人曾经怎样生活、怎样工作、怎样把一个家慢慢撑起来。每一个二维码背后，都是一户家庭愿意留下来的真实片段。</p>
        </div>
      </div>

      <blockquote>我们的记忆放在一起，就是社区自己的历史。</blockquote>

      <footer>
        <div>
          <span>讲述人：社区家庭代表</span>
          <span>共创人：实践团队</span>
          <span>展示范围：可公开展示</span>
        </div>
        <img src="https://godjinfinity-cpu.github.io/suiyue-memory/qrcodes/F003.png" alt="一面展墙里的社区记忆二维码">
      </footer>
    </article>
  </main>
</body>
</html>
